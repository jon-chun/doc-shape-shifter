<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="white"/>

  <!-- Stone tablet - trapezoid shape -->
  <polygon points="100,100 412,100 380,430 132,430" fill="#4A4A4A" stroke="#222" stroke-width="5" stroke-linejoin="round"/>

  <!-- Divider lines -->
  <line x1="204" y1="110" x2="216" y2="420" stroke="#333" stroke-width="3"/>
  <line x1="308" y1="110" x2="296" y2="420" stroke="#333" stroke-width="3"/>

  <!-- Left panel - Code/Markup (teal) -->
  <polygon points="108,115 204,115 216,420 139,420" fill="#00897B" opacity="0.85"/>
  <!-- Angle brackets -->
  <g fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="140,210 125,240 140,270"/>
    <polyline points="180,210 195,240 180,270"/>
    <line x1="150" y1="300" x2="185" y2="300"/>
    <line x1="145" y1="320" x2="195" y2="320"/>
    <line x1="150" y1="340" x2="180" y2="340"/>
  </g>

  <!-- Center panel - Text (coral) -->
  <polygon points="204,115 308,115 296,420 216,420" fill="#E8655A" opacity="0.85"/>
  <!-- Paragraph lines -->
  <g stroke="white" stroke-width="4" stroke-linecap="round">
    <line x1="228" y1="200" x2="284" y2="200"/>
    <line x1="225" y1="222" x2="288" y2="222"/>
    <line x1="227" y1="244" x2="280" y2="244"/>
    <line x1="225" y1="266" x2="286" y2="266"/>
    <line x1="228" y1="300" x2="282" y2="300"/>
    <line x1="226" y1="322" x2="287" y2="322"/>
    <line x1="228" y1="344" x2="270" y2="344"/>
  </g>

  <!-- Right panel - Table/Grid (gold) -->
  <polygon points="308,115 412,115 380,420 296,420" fill="#F9A825" opacity="0.85"/>
  <!-- Grid lines -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round">
    <!-- Horizontal -->
    <line x1="312" y1="210" x2="390" y2="210"/>
    <line x1="310" y1="245" x2="385" y2="245"/>
    <line x1="308" y1="280" x2="382" y2="280"/>
    <line x1="306" y1="315" x2="378" y2="315"/>
    <line x1="304" y1="350" x2="375" y2="350"/>
    <!-- Vertical -->
    <line x1="338" y1="195" x2="330" y2="365"/>
    <line x1="368" y1="195" x2="358" y2="365"/>
  </g>

  <!-- Curved arrow over the top -->
  <path d="M 140,95 C 170,30 340,30 372,95" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="372,95 360,70 382,78" fill="#222"/>
</svg>
