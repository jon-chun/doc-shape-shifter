<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="white"/>

  <!-- Document stack -->
  <!-- Bottom doc (green tab - MD) -->
  <g transform="translate(120, 300)">
    <rect x="0" y="0" width="200" height="140" rx="6" fill="#F5F5F5" stroke="#222" stroke-width="4"/>
    <rect x="0" y="0" width="200" height="24" rx="6" fill="#4CAF50" stroke="#222" stroke-width="4"/>
    <rect x="0" y="18" width="200" height="12" fill="#4CAF50"/>
    <line x1="20" y1="50" x2="140" y2="50" stroke="#CCC" stroke-width="3"/>
    <line x1="20" y1="70" x2="160" y2="70" stroke="#CCC" stroke-width="3"/>
    <line x1="20" y1="90" x2="120" y2="90" stroke="#CCC" stroke-width="3"/>
  </g>

  <!-- Middle doc (blue tab - DOCX) -->
  <g transform="translate(145, 280)">
    <rect x="0" y="0" width="200" height="140" rx="6" fill="#FAFAFA" stroke="#222" stroke-width="4"/>
    <rect x="0" y="0" width="200" height="24" rx="6" fill="#2196F3" stroke="#222" stroke-width="4"/>
    <rect x="0" y="18" width="200" height="12" fill="#2196F3"/>
    <line x1="20" y1="50" x2="150" y2="50" stroke="#CCC" stroke-width="3"/>
    <line x1="20" y1="70" x2="170" y2="70" stroke="#CCC" stroke-width="3"/>
    <line x1="20" y1="90" x2="130" y2="90" stroke="#CCC" stroke-width="3"/>
  </g>

  <!-- Top doc (red tab - PDF) -->
  <g transform="translate(170, 260)">
    <rect x="0" y="0" width="200" height="140" rx="6" fill="white" stroke="#222" stroke-width="4"/>
    <rect x="0" y="0" width="200" height="24" rx="6" fill="#F44336" stroke="#222" stroke-width="4"/>
    <rect x="0" y="18" width="200" height="12" fill="#F44336"/>
    <line x1="20" y1="50" x2="160" y2="50" stroke="#DDD" stroke-width="3"/>
    <line x1="20" y1="70" x2="140" y2="70" stroke="#DDD" stroke-width="3"/>
    <line x1="20" y1="90" x2="170" y2="90" stroke="#DDD" stroke-width="3"/>
  </g>

  <!-- Chameleon body -->
  <g transform="translate(160, 100)">
    <!-- Tail curl -->
    <path d="M 20,140 C -20,160 -30,120 -10,100 C 5,85 20,110 20,140" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round"/>

    <!-- Body - three color bands -->
    <ellipse cx="100" cy="120" rx="85" ry="50" fill="#F44336" stroke="#222" stroke-width="5"/>
    <!-- Blue band -->
    <clipPath id="bodyClip">
      <ellipse cx="100" cy="120" rx="83" ry="48"/>
    </clipPath>
    <rect x="60" y="72" width="40" height="96" fill="#2196F3" clip-path="url(#bodyClip)"/>
    <rect x="100" y="72" width="50" height="96" fill="#4CAF50" clip-path="url(#bodyClip)"/>

    <!-- Legs -->
    <line x1="70" y1="160" x2="60" y2="195" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line x1="60" y1="195" x2="50" y2="195" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line x1="130" y1="160" x2="140" y2="195" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line x1="140" y1="195" x2="150" y2="195" stroke="#222" stroke-width="5" stroke-linecap="round"/>

    <!-- Head -->
    <ellipse cx="195" cy="105" rx="40" ry="32" fill="#4CAF50" stroke="#222" stroke-width="5"/>
    <!-- Eye -->
    <circle cx="210" cy="95" r="10" fill="white" stroke="#222" stroke-width="3"/>
    <circle cx="213" cy="93" r="4" fill="#222"/>
    <!-- Crest bumps -->
    <circle cx="185" cy="76" r="8" fill="#4CAF50" stroke="#222" stroke-width="3"/>
    <circle cx="200" cy="72" r="7" fill="#4CAF50" stroke="#222" stroke-width="3"/>
  </g>
</svg>
